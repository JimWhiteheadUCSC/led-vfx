<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>LED VFX — Sim Display</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    background: #000;
  }
  #status {
    position: fixed;
    top: 8px;
    left: 8px;
    font: 12px monospace;
    color: #666;
  }
  #button {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    font: 14px monospace;
    color: #ccc;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    cursor: pointer;
  }
  #button.pressed {
    background: #444;
    color: #fff;
    border-color: #888;
  }
</style>
</head>
<body>
<div id="status">connecting…</div>
<canvas id="panel"></canvas>
<div id="button">hold</div>
<script src="client.js"></script>
</body>
</html>
